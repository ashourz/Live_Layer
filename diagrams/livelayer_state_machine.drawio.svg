<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     version="1.1" width="1400" height="760" viewBox="0 0 1400 760"
     content="&lt;mxGraphModel&gt;&lt;root&gt;&lt;mxCell id=&quot;0&quot;/&gt;&lt;mxCell id=&quot;1&quot; parent=&quot;0&quot;/&gt;&lt;/root&gt;&lt;/mxGraphModel&gt;">
  <defs>
    <style>
      .subtitle { font: 12px Inter, Arial, sans-serif; fill: #94a3b8; }
      .state { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
      .terminal { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; }
      .error { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; }
      .state-text { font: bold 14px Inter, Arial, sans-serif; fill: #1e3a5f; }
      .state-note { font: 11px Inter, Arial, sans-serif; fill: #334155; }
      .edge { stroke: #3b82f6; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .edge-text { font: bold 11px Inter, Arial, sans-serif; fill: #1e3a5f; }
      .edge-label-chip { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
      .legend-box { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.5; }
      .legend-text { font: 12px Inter, Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="760" rx="12" fill="#ffffff"/>

  <rect x="20" y="12" width="1360" height="48" rx="8" fill="#1e293b"/>
  <text x="700" y="34" text-anchor="middle" style="font: bold 18px Inter, Arial, sans-serif; fill: #ffffff;">LiveLayer Streaming Service State Machine</text>
  <text x="700" y="52" class="subtitle" text-anchor="middle">Lifecycle from Go Live to recovery, degradation, and stop with clean transition constraints</text>

  <!-- Row 1: equal width and spacing -->
  <rect x="90" y="100" width="220" height="92" rx="12" class="terminal"/>
  <text x="200" y="136" class="state-text" text-anchor="middle">Idle</text>
  <text x="200" y="158" class="state-note" text-anchor="middle">Service not running</text>

  <rect x="340" y="100" width="220" height="92" rx="12" class="state"/>
  <text x="450" y="136" class="state-text" text-anchor="middle">Initializing</text>
  <text x="450" y="158" class="state-note" text-anchor="middle">Camera + GL + encoder setup</text>

  <rect x="590" y="100" width="220" height="92" rx="12" class="state"/>
  <text x="700" y="136" class="state-text" text-anchor="middle">Previewing</text>
  <text x="700" y="158" class="state-note" text-anchor="middle">Pipeline warm-up</text>

  <rect x="840" y="100" width="220" height="92" rx="12" class="state"/>
  <text x="950" y="136" class="state-text" text-anchor="middle">Live</text>
  <text x="950" y="158" class="state-note" text-anchor="middle">RTSP broadcast active</text>

  <rect x="1090" y="100" width="220" height="92" rx="12" class="state"/>
  <text x="1200" y="136" class="state-text" text-anchor="middle">Adaptive Degraded</text>
  <text x="1200" y="158" class="state-note" text-anchor="middle">Reduced bitrate / overlay scale</text>

  <!-- Row 2: equal width and spacing -->
  <rect x="340" y="260" width="220" height="92" rx="12" class="terminal"/>
  <text x="450" y="296" class="state-text" text-anchor="middle">Stopped</text>
  <text x="450" y="318" class="state-note" text-anchor="middle">Foreground service ended</text>

  <rect x="590" y="260" width="220" height="92" rx="12" class="error"/>
  <text x="700" y="296" class="state-text" text-anchor="middle">Error</text>
  <text x="700" y="318" class="state-note" text-anchor="middle">Camera / encoder / GL failure</text>

  <rect x="840" y="260" width="220" height="92" rx="12" class="state"/>
  <text x="950" y="296" class="state-text" text-anchor="middle">Reconnecting</text>
  <text x="950" y="318" class="state-note" text-anchor="middle">Session + socket recovery</text>

  <!-- Primary forward transitions -->
  <path d="M 310 146 L 340 146" class="edge"/>
  <rect x="293" y="118" width="64" height="18" rx="6" class="edge-label-chip"/>
  <text x="325" y="132" class="edge-text" text-anchor="middle">Go Live</text>

  <path d="M 560 146 L 590 146" class="edge"/>
  <rect x="541" y="118" width="68" height="18" rx="6" class="edge-label-chip"/>
  <text x="575" y="132" class="edge-text" text-anchor="middle">setup ok</text>

  <path d="M 810 146 L 840 146" class="edge"/>
  <rect x="774" y="118" width="102" height="18" rx="6" class="edge-label-chip"/>
  <text x="825" y="132" class="edge-text" text-anchor="middle">first keyframe</text>

  <path d="M 1060 146 L 1090 146" class="edge"/>
  <rect x="1020" y="118" width="110" height="18" rx="6" class="edge-label-chip"/>
  <text x="1075" y="132" class="edge-text" text-anchor="middle">latency &gt; 33 ms</text>

  <!-- Recovery and error routing with non-overlapping paths -->
  <path d="M 1090 170 L 1060 170" class="edge"/>
  <rect x="1027" y="172" width="96" height="18" rx="6" class="edge-label-chip"/>
  <text x="1075" y="186" class="edge-text" text-anchor="middle">network recovers</text>

  <path d="M 930 192 L 930 260" class="edge"/>
  <rect x="867" y="212" width="76" height="18" rx="6" class="edge-label-chip"/>
  <text x="905" y="226" class="edge-text" text-anchor="middle">disconnect</text>

  <path d="M 840 306 L 810 306" class="edge"/>
  <rect x="769" y="278" width="112" height="18" rx="6" class="edge-label-chip"/>
  <text x="825" y="292" class="edge-text" text-anchor="middle">retry exhausted</text>

  <path d="M 970 260 L 970 192" class="edge"/>
  <rect x="956" y="212" width="78" height="18" rx="6" class="edge-label-chip"/>
  <text x="995" y="226" class="edge-text" text-anchor="middle">recovered</text>

  <path d="M 590 306 L 560 306" class="edge"/>
  <rect x="523" y="278" width="104" height="18" rx="6" class="edge-label-chip"/>
  <text x="575" y="292" class="edge-text" text-anchor="middle">stop requested</text>

  <path d="M 450 260 L 450 192" class="edge"/>
  <rect x="430" y="212" width="104" height="18" rx="6" class="edge-label-chip"/>
  <text x="482" y="226" class="edge-text" text-anchor="middle">restart stream</text>

  <!-- Global stop bus -->
  <path d="M 950 352 L 950 390 L 450 390 L 450 352" class="edge"/>
  <rect x="628" y="368" width="144" height="18" rx="6" class="edge-label-chip"/>
  <text x="700" y="382" class="edge-text" text-anchor="middle">global stop / app exit</text>

  <!-- Legend -->
  <rect x="70" y="460" width="1260" height="170" rx="10" class="legend-box"/>
  <text x="95" y="490" class="legend-text">Transition rules:</text>
  <text x="95" y="515" class="legend-text">1. Idle is the only entry state. Live is reachable only via Initializing and Previewing.</text>
  <text x="95" y="538" class="legend-text">2. Adaptive Degraded is a temporary mode of Live; it returns when latency stabilizes.</text>
  <text x="95" y="561" class="legend-text">3. Reconnecting returns to Live on success, or transitions to Error after retry budget exhaustion.</text>
  <text x="95" y="584" class="legend-text">4. Stop is globally available from active states and lands in Stopped.</text>
  <text x="95" y="607" class="legend-text">5. Error recovery requires explicit restart policy or user action.</text>
</svg>
